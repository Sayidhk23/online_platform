{% extends 'base.html' %}
{% block content %}
  <h2>Search Results for "{{ query }}"</h2>

  {% if results %}
    <ul>
      {% for course in results %}
        <li>
          <a href="{% url 'details' course.id %}">{{ course.title }}</a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>No results found.</p>
  {% endif %}
{% endblock %}
